<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathius Boss Fight</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#1b1b1b;
        font-family:Arial;
    }

    canvas{
        display:block;
        background:linear-gradient(#3a3a3a,#111);
    }

    #info{
        position:absolute;
        top:10px;
        left:10px;
        color:white;
        font-size:22px;
        z-index:10;
    }

    #gameover{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:white;
        font-size:50px;
        display:none;
        text-align:center;
    }

    button{
        padding:10px 20px;
        font-size:20px;
        cursor:pointer;
        border:none;
        border-radius:10px;
    }
</style>
</head>
<body>
<h1 id="titulo">¡Derrota a Mathius!</h1>
<div id="info">
    ❤️ Vida: <span id="vida">5</span>
    <br>
    👑 Boss HP: <span id="bossvida">20</span>
</div>

<div id="gameover">
    <div id="texto"></div>
    <br>
    <button onclick="location.reload()">Reiniciar</button>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const vidaTexto = document.getElementById("vida");
const bossTexto = document.getElementById("bossvida");
const gameover = document.getElementById("gameover");
const texto = document.getElementById("texto");

let keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

const player = {
    x:100,
    y:400,
    w:60,
    h:60,
    speed:6,
    vida:5
};

const boss = {
    x:900,
    y:200,
    w:180,
    h:180,
    hp:20,
    dir:3
};

const bullets = [];
const enemyBullets = [];

const imgBoss = new Image();
imgBoss.src = "mathius.jpg";

function shoot(){
    bullets.push({
        x:player.x + player.w,
        y:player.y + player.h/2,
        w:15,
        h:6,
        speed:10
    });
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space"){
        shoot();
    }
});

function enemyShoot(){
    enemyBullets.push({
        x:boss.x,
        y:boss.y + boss.h/2,
        w:20,
        h:20,
        speed:7
    });
}

setInterval(enemyShoot,1000);

function update(){

    if(keys["ArrowUp"]){
        player.y -= player.speed;
    }

    if(keys["ArrowDown"]){
        player.y += player.speed;
    }

    if(keys["ArrowLeft"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"]){
        player.x += player.speed;
    }

    boss.y += boss.dir;

    if(boss.y <= 50 || boss.y >= canvas.height - 220){
        boss.dir *= -1;
    }

    bullets.forEach((b,index)=>{
        b.x += b.speed;

        if(
            b.x < boss.x + boss.w &&
            b.x + b.w > boss.x &&
            b.y < boss.y + boss.h &&
            b.y + b.h > boss.y
        ){
            boss.hp--;
            bullets.splice(index,1);
            bossTexto.innerHTML = boss.hp;
        }
    });

    enemyBullets.forEach((b,index)=>{

        b.x -= b.speed;

        if(
            b.x < player.x + player.w &&
            b.x + b.w > player.x &&
            b.y < player.y + player.h &&
            b.y + b.h > player.y
        ){
            player.vida--;
            enemyBullets.splice(index,1);
            vidaTexto.innerHTML = player.vida;
        }
    });

    if(player.vida <= 0){
        terminar("💀 PERDISTE");
    }

    if(boss.hp <= 0){
        terminar("🏆 GANASTE");
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // piso
    ctx.fillStyle = "#444";
    ctx.fillRect(0, canvas.height-100, canvas.width, 100);

    // jugador
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // boss
    ctx.drawImage(imgBoss,boss.x,boss.y,boss.w,boss.h);

    // balas jugador
    ctx.fillStyle = "yellow";

    bullets.forEach(b=>{
        ctx.fillRect(b.x,b.y,b.w,b.h);
    });

    // balas boss
    ctx.fillStyle = "red";

    enemyBullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,10,0,Math.PI*2);
        ctx.fill();
    });
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function terminar(msg){
    gameover.style.display = "block";
    texto.innerHTML = msg;
}

gameLoop();

</script>
atrapa
</body>
</html>
